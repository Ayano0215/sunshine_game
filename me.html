/* 全域基本設定 */
body {
    margin: 0;
    padding: 0;
    font-family: "Microsoft JhengHei", sans-serif;
    background-image: url('me_pic/個人介紹封面.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-position: center center;
    background-size: cover;
    overflow-x: hidden;
    position: relative;
    /* 預設為黑底以襯托星空與背景圖 */
    background-color: #0b0c10; 
    
    /* 進入淡入動畫 */
    opacity: 0;
    animation: fadeIn 1.5s forwards, moveBg 30s infinite alternate ease-in-out;
}

/* CSS 星星閃爍背景特效 */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    /* 運用漸層打造微小星星群 */
    background-image: 
        radial-gradient(1.5px 1.5px at 20px 30px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 230px 220px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 290px 10px, #fff, rgba(0,0,0,0));
    background-size: 350px 350px;
    animation: twinkle 4s infinite ease-in-out;
}

/* 動畫定義 */
@keyframes fadeIn {
    to { opacity: 1; }
}

@keyframes moveBg {
    from { background-position: center top; }
    to { background-position: center bottom; }
}

@keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

/* 內容容器容器（確保在星星之上） */
.main-container {
    position: relative;
    z-index: 1;
    padding: 40px;
    box-sizing: border-box;
}

/* 自介文字區優化 */
.intro-text {
    color: #FFFFFF;
    font-size: 24px;
    line-height: 1.8;
    letter-spacing: 1.5px;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
    margin-top: 10vh;
    margin-bottom: 8vh;
    font-weight: bold;
}
.intro-text span {
    display: inline-block;
    margin-bottom: 10px;
}

/* 按鈕表格樣式改進 */
.nav-table {
    width: 100%;
    max-width: 900px;
    margin-bottom: 8vh;
    border-spacing: 20px; /* 讓按鈕之間有漂亮的間距 */
}

.auto-style6 {
    background-color: rgba(255, 255, 255, 0.15); /* 改為半透明玻璃質感 */
    backdrop-filter: blur(5px); /* 磨砂玻璃效果 */
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 30px; /* 圓角化更加現代 */
    text-align: center;
    padding: 15px 0;
    transition: all 0.3s ease;
}

.auto-style6:hover {
    background-color: rgba(255, 255, 255, 0.9); /* 滑過時變回亮白 */

}

.auto-style5 {

.auto-style7 {

.auto-style6:hover .auto-style7 {

/* 回家按鈕優化 */
